name: certora-bug-injection

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  list-patches:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v2
      - id: set-matrix
        run: echo ::set-output name=matrix::$(ls certora/tests/certora/*.patch | jq -Rsc 'split("\n")[:-1]')

  verify:
    runs-on: ubuntu-latest
    needs: 
        - list-patches
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Check key
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: echo "key length" ${#CERTORAKEY}

      - name: Install python
        uses: actions/setup-python@v2
        with: { python-version: 3.9 }

      - name: Install java
        uses: actions/setup-java@v1
        with: { java-version: "11", java-package: jre }

      - name: Install certora cli
        run: pip install certora-cli
      
      - name: Install solc
        run: |
          wget https://github.com/ethereum/solidity/releases/download/v0.8.10/solc-static-linux
          chmod +x solc-static-linux
          sudo mv solc-static-linux /usr/local/bin/solc8.10

      - name: Verify rule ${{ matrix.rule }}
        run: |
          cd certora
          touch applyHarness.patch
          make munged
          cd ..
          git apply --allow-empty ${{ matrix.patch }}
          certoraRun certora/confs/${{ matrix.rule }}
          
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
          
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        patch: ${{ fromJson(needs.list-patches.outputs.matrix) }} 
        rule: 
            - verifyERC4626.conf --rules previewMintIndependentOfAllowance previewRedeemIndependentOfBalance maxMintMustntRevert previewMintAmountCheck previewDepositIndependentOfAllowanceApprove previewWithdrawIndependentOfMaxWithdraw previewWithdrawAmountCheck previewWithdrawIndependentOfBalance2 previewWithdrawIndependentOfBalance1 previewRedeemIndependentOfMaxRedeem1 previewRedeemAmountCheck previewRedeemIndependentOfMaxRedeem2 amountConversionRoundedDown withdrawCheck redeemCheck convertToAssetsCheck convertToSharesCheck toAssetsDoesNotRevert sharesConversionRoundedDown toSharesDoesNotRevert maxDepositMustntRevert maxRedeemMustntRevert previewDepositAmountCheck maxWithdrawRedeemCompliance maxWithdrawConversionCompliance
            - verifyERC4626MintDepositSummarization.conf --rules depositCheckIndexGRayAssert2 depositCheckIndexERayAssert2 mintCheckIndexGRayUpperBound mintCheckIndexGRayLowerBound mintCheckIndexEqualsRay 
            # - verifyERC4626DepositSummarization.conf --rules depositCheckIndexGRayAssert1
            #   # Timeout
            - verifyERC4626DepositSummarization.conf --rules depositCheckIndexERayAssert1
            - verifyERC4626Extended.conf --rules previewWithdrawRoundingRange previewRedeemRoundingRange amountConversionPreserved sharesConversionPreserved accountsJoiningSplittingIsLimited convertSumOfAssetsPreserved previewDepositSameAsDeposit previewMintSameAsMint maxDepositConstant
            - verifyERC4626Extended.conf --rules redeemSum
            - verifyAToken.conf --rules aTokenBalanceIsFixed_for_collectAndUpdateRewards aTokenBalanceIsFixed_for_claimRewards aTokenBalanceIsFixed_for_claimRewardsOnBehalf
            - verifyAToken.conf --rules aTokenBalanceIsFixed_for_claimSingleRewardOnBehalf aTokenBalanceIsFixed_for_claimRewardsToSelf
            - verifyStaticATokenLM.conf --rules rewardsConsistencyWhenSufficientRewardsExist
            - verifyStaticATokenLM.conf --rules rewardsConsistencyWhenInsufficientRewards
            - verifyStaticATokenLM.conf --rules rewardsTotalDeclinesOnlyByClaim
            - verifyStaticATokenLM.conf --rules rewardsTotalDeclinesOnlyByClaim_timedout_methods
            - verifyStaticATokenLM.conf --rules rewardsTotalDeclinesOnlyByClaim_redeem_methods
            - verifyStaticATokenLM.conf --rules solvency_positive_total_supply_only_if_positive_asset
            - verifyStaticATokenLM.conf --rules solvency_total_asset_geq_total_supply
            - verifyStaticATokenLM.conf --rules solvency_total_asset_geq_total_supply_CASE_SPLIT_redeem
            - verifyStaticATokenLM.conf --rules singleAssetAccruedRewards
            - verifyStaticATokenLM.conf --rules totalAssets_stable
            - verifyStaticATokenLM.conf --rules totalAssets_stable_after_collectAndUpdateRewards
            - verifyStaticATokenLM.conf --rules reward_balance_stable_after_collectAndUpdateRewards
            - verifyStaticATokenLM.conf --rules totalClaimableRewards_stable_CASE_SPLIT
            # - verifyStaticATokenLM.conf --rules totalClaimableRewards_stable_CASE_SPLIT_redeem
            #   # Timeout
            - verifyStaticATokenLM.conf --rules getClaimableRewards_stable
            - verifyStaticATokenLM.conf --rules getClaimableRewards_stable_after_deposit
            - verifyStaticATokenLM.conf --rules getClaimableRewards_stable_after_redeem 
            - verifyStaticATokenLM.conf --rules totalClaimableRewards_stable_CASE_SPLIT_deposit
            - verifyStaticATokenLM.conf --rules getClaimableRewards_stable_after_refreshRewardTokens
            - verifyStaticATokenLM.conf --rules getClaimableRewardsBefore_leq_claimed_claimRewardsOnBehalf
            - verifyDoubleClaim.conf --rules prevent_duplicate_reward_claiming_single_reward_sufficient
            - verifyDoubleClaim.conf --rules prevent_duplicate_reward_claiming_single_reward_insufficient